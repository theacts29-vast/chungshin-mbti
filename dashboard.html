};

const axColors={E:"#4A6FA5",I:"#9B59B6",S:"#3A7A55",N:"#A07820",T:"#2980B9",F:"#C0392B",J:"#7D5BD4",P:"#D47010"};

let responses = [];
let currentPage = "opening";
let selected = "전체";

function getAxisKey(a,b,va,vb){
  if(va>vb*1.3) return a+a;
  if(vb>va*1.3) return b+b;
  return a+b;
}
function countAxis(rs){
  const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  rs.forEach(r=>{if(r.mbti)[...r.mbti].forEach(ch=>{if(c[ch]!==undefined)c[ch]++;});});
  return c;
}

window.loadData = async function() {
  try {
    const snap = await get(ref(db,"responses"));
    if(snap.exists()){
      responses = Object.values(snap.val()).sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    } else { responses=[]; }
    const n=responses.length;
    document.getElementById("count-badge").textContent=n+"/"+TEAM_SIZE+"명";
    render();
  } catch(e){console.error(e);}
};

window.togglePage = function(){
  currentPage = currentPage==="opening"?"dashboard":"opening";
  document.getElementById("page-btn").textContent = currentPage==="opening"?"결과 보기 →":"← 오프닝";
  document.getElementById("page-btn").style.background = currentPage==="opening"?"#4A6FA5":"#C26A3A";
  render();
};

window.selectPerson = function(name){
  selected=name; render();
};

// Real-time listener
import { onValue as fbOnValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
fbOnValue(ref(db,"responses"), snap=>{
  responses = snap.exists()?Object.values(snap.val()).sort((a,b)=>a.name.localeCompare(b.name,"ko")):[];
  document.getElementById("count-badge").textContent=responses.length+"/"+TEAM_SIZE+"명";
  render();
});

// Reset (진행자용 - 비밀번호 확인)
window.resetData = async function(){
  const pw = prompt("초기화 비밀번호를 입력하세요:");
  if(pw === null) return; // 취소
  if(pw !== "영아부2025") { alert("비밀번호가 틀렸습니다."); return; }
  if(!confirm("테스트 데이터를 모두 삭제하시겠어요?\n이 작업은 되돌릴 수 없습니다.")) return;
  try {
    await remove(ref(db,"responses"));
    alert("✅ 초기화 완료!\n대시보드가 자동으로 갱신됩니다.");
  } catch(e) {
    alert("오류가 발생했습니다: " + e.message);
    console.error(e);
  }
};

function renderDashboard(){
  const n=responses.length;
  const axis=countAxis(responses);
  const pct=Math.round((n/TEAM_SIZE)*100);
  const typeCounts={};
  responses.forEach(r=>{if(r.mbti)typeCounts[r.mbti]=(typeCounts[r.mbti]||0)+1;});

  const selRow=`<div class="selector"><div class="sel-row">
    <button class="sel-btn" onclick="selectPerson('전체')" style="border:1.5px solid ${selected==="전체"?"#C26A3A":"#EDE8DF"};background:${selected==="전체"?"#C26A3A":"#fff"};color:${selected==="전체"?"#fff":"#8C7F6E"};font-family:inherit">🌸 전체 영아부</button>
    ${responses.map(r=>{const inf=MBTI_INFO[r.mbti];const a=selected===r.name;return`<button class="sel-btn" onclick="selectPerson('${r.name}')" style="border:1.5px solid ${a?(inf?.color||"#C26A3A"):"#EDE8DF"};background:${a?(inf?.color||"#C26A3A"):"#fff"};color:${a?"#fff":"#8C7F6E"};font-family:inherit">${inf?.emoji||"👤"} ${r.name}</button>`}).join("")}
  </div></div>`;

  if(selected==="전체"){
    if(n===0) return selRow+`<div class="section"><div class="card" style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px">🌱</div><div style="font-size:14px;color:#8C7F6E">아직 응답이 없어요.<br>오프닝 화면에서 링크를 공유해주세요.</div></div></div>`;

    const domE=axis.E>=axis.I?"E":"I", domS=axis.S>=axis.N?"S":"N", domT=axis.T>=axis.F?"T":"F", domJ=axis.J>=axis.P?"J":"P";
    const eiI=AXIS_TEAM[getAxisKey("E","I",axis.E,axis.I)];
    const snI=AXIS_TEAM[getAxisKey("S","N",axis.S,axis.N)];
    const tfI=AXIS_TEAM[getAxisKey("T","F",axis.T,axis.F)];
    const jpI=AXIS_TEAM[getAxisKey("J","P",axis.J,axis.P)];

    return selRow+`<div class="section">
      <div class="card">
        <div class="card-label">설문 완료 현황</div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
          <span style="font-size:44px;font-weight:900;line-height:1">${n}</span>
          <span style="font-size:14px;color:#8C7F6E">/ ${TEAM_SIZE}명 · ${pct}%</span>
        </div>
        <div style="height:8px;background:#F5F0E8;border-radius:4px;overflow:hidden;margin-bottom:10px">
          <div style="height:100%;width:${pct}%;background:${pct>=80?"#3A7A55":"#A07820"};border-radius:4px;transition:width .5s"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${responses.map(r=>{const inf=MBTI_INFO[r.mbti];return`<span class="chip" onclick="selectPerson('${r.name}')" style="cursor:pointer;background:${inf?inf.color+"18":"#F5F0E8"};border:1px solid ${inf?inf.color+"40":"#EDE8DF"}">${inf?.emoji||""} ${r.name} <strong style="color:${inf?.color||"#8C7F6E"}">${r.mbti}</strong></span>`}).join("")}</div>
      </div>
      <div class="card">
        <div class="card-label">영아부 성향 분포</div>
        ${[["E","I","에너지"],["S","N","인식"],["T","F","판단"],["J","P","생활방식"]].map(([a,b,lbl])=>{
          const tot=(axis[a]||0)+(axis[b]||0)||1, pa=Math.round((axis[a]/tot)*100);
          return`<div class="bar-row">
            <div class="bar-labels"><span style="color:${axColors[a]};font-weight:600">${a} · ${pa}%</span><span style="color:#8C7F6E">${lbl}</span><span style="color:${axColors[b]};font-weight:600">${b} · ${100-pa}%</span></div>
            <div class="bar-track"><div style="width:${pa}%;background:${axColors[a]}"></div><div style="flex:1;background:${axColors[b]}"></div></div>
          </div>`;}).join("")}
      </div>
      <div class="card">
        <div class="card-label">MBTI 유형 분포</div>
        <div class="type-grid">${Object.entries(MBTI_INFO).map(([type,inf])=>{const cnt=typeCounts[type]||0;return`<div style="background:${cnt>0?inf.color+"18":"#F5F0E8"};border:1px solid ${cnt>0?inf.color+"50":"#EDE8DF"};border-radius:10px;padding:8px 10px;min-width:68px;text-align:center;opacity:${cnt>0?1:.4}"><div style="font-size:16px">${inf.emoji}</div><div style="font-size:12px;font-weight:900;color:${cnt>0?inf.color:"#8C7F6E"};letter-spacing:1px">${type}</div><div style="font-size:10px;color:#8C7F6E">${inf.name}</div>${cnt>0?`<div style="font-size:13px;font-weight:700;color:${inf.color};margin-top:2px">${cnt}명</div>`:""}</div>`}).join("")}</div>

        <div class="card-label">영아부 팀 인사이트</div>

          <div style="font-size:14px;font-weight:700;color:#2D2A24;margin-bottom:5px">${info.icon} ${info.title}</div>
          <p style="font-size:13px;color:#8C7F6E;line-height:1.85;margin:0 0 5px">${info.text}</p>
          <div style="font-size:12px;color:#3A7A55;font-style:italic">💚 섬김의 강점: ${info.serve}</div>
          ${i<3?`<div class="divider"></div>`:""}
        </div>`:"").join("")}
      </div>
      <div class="card">
        <div class="card-label">선생님들 MBTI 카드</div>
        <div class="member-grid">${responses.map(r=>{const inf=MBTI_INFO[r.mbti]||{color:"#8C7F6E",emoji:"❓",name:""};return`<div class="m-card" style="border:1.5px solid ${inf.color}40" onclick="selectPerson('${r.name}')"><div style="font-size:18px;margin-bottom:2px">${inf.emoji}</div><div style="font-size:13px;font-weight:900;color:${inf.color};letter-spacing:2px">${r.mbti}</div><div style="font-size:12px;font-weight:700;color:#2D2A24;margin-top:1px">${r.name}</div><div style="font-size:10px;color:#8C7F6E">${r.dept}</div></div>`}).join("")}</div>

    const person=responses.find(r=>r.name===selected);
    const info=person?MBTI_INFO[person.mbti]:null;
    if(!person||!info) return selRow+`<div class="section"><div class="card" style="text-align:center;padding:30px"><div style="font-size:13px;color:#8C7F6E">아직 응답이 없습니다.</div></div></div>`;
    const col=info.color;
    const ax2=[["E","I","에너지 방향","외향","내향"],["S","N","정보 인식","감각","직관"],["T","F","의사결정","사고","감정"],["J","P","생활 방식","판단","인식"]];
    const sc = person.scores || null;
    return selRow+`<div class="section">
      <div class="card" style="text-align:center">
        <div style="font-size:42px;margin-bottom:8px">${info.emoji}</div>
        <div style="font-size:48px;font-weight:900;color:${col};letter-spacing:6px;margin-bottom:4px">${person.mbti}</div>
        <div style="font-size:17px;color:#8C7F6E;margin-bottom:10px">${info.name}</div>
        <div style="font-size:15px;font-weight:700;color:#2D2A24;margin-bottom:3px">${person.name} 선생님</div>
        <div style="font-size:12px;color:#8C7F6E;margin-bottom:12px">${person.dept}</div>
        <div style="font-size:14px;color:#8C7F6E;line-height:1.85;max-width:360px;margin:0 auto">${info.summary}</div>
      </div>
      <div class="card">
        <div class="ibox" style="background:${col}12;border-left:3px solid ${col}"><div class="ibox-lbl" style="color:${col}">🌱 은사와 강점</div><div class="ibox-txt">${info.gift}</div></div>
        <div class="ibox" style="background:#4A6FA512;border-left:3px solid #4A6FA5"><div class="ibox-lbl" style="color:#4A6FA5">🙌 영아부에서의 섬김 방식</div><div class="ibox-txt">${info.serve}</div></div>
        <div class="ibox" style="background:#A0782012;border-left:3px solid #A07820"><div class="ibox-lbl" style="color:#A07820">🌿 함께 성장할 부분</div><div class="ibox-txt">${info.grow}</div></div>
        <div class="ibox" style="background:#C26A3A12;border-left:3px solid #C26A3A"><div class="ibox-lbl" style="color:#C26A3A">🤝 시너지 파트너</div><div class="ibox-txt">${info.together}</div></div>
      </div>
      <div class="card">
        <div class="card-label">성향 상세</div>
        ${ax2.map(([a,b,lbl,aName,bName],idx)=>{
          let pa, pb;
          if(sc && sc[a]!==undefined && sc[b]!==undefined) {
            const tot=(sc[a]||0)+(sc[b]||0)||1;
            pa=Math.round((sc[a]/tot)*100); pb=100-pa;
          } else {
            const ch=person.mbti[idx]; pa=ch===a?100:0; pb=100-pa;
          }
          const dominant=pa>=pb?a:b;
          return`<div style="margin-bottom:18px">
            <div style="font-size:11px;color:#8C7F6E;margin-bottom:6px;font-weight:600;letter-spacing:1px">${lbl}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="text-align:left">
                <span style="font-size:18px;font-weight:900;color:${dominant===a?axColors[a]:"#CBD5E0"}">${a}</span>
                <span style="font-size:13px;font-weight:700;color:${dominant===a?axColors[a]:"#CBD5E0"};margin-left:3px">${pa}%</span>
                <div style="font-size:10px;color:${dominant===a?"#8C7F6E":"#CBD5E0"};margin-top:1px">${aName}</div>
              </div>
              <div style="text-align:right">
                <span style="font-size:13px;font-weight:700;color:${dominant===b?axColors[b]:"#CBD5E0"};margin-right:3px">${pb}%</span>
                <span style="font-size:18px;font-weight:900;color:${dominant===b?axColors[b]:"#CBD5E0"}">${b}</span>
                <div style="font-size:10px;color:${dominant===b?"#8C7F6E":"#CBD5E0"};margin-top:1px;text-align:right">${bName}</div>
              </div>
            </div>
            <div class="bar-track" style="height:12px;border-radius:6px">
              <div style="width:${pa}%;background:${axColors[a]};border-radius:6px 0 0 6px;min-width:${pa>0?4:0}px"></div>
              <div style="flex:1;background:${axColors[b]};border-radius:0 6px 6px 0;min-width:${pb>0?4:0}px"></div>
            </div>
            <div style="text-align:center;margin-top:5px;font-size:11px;color:#8C7F6E">
              ${pa===pb?"균형잡힌 성향이에요":pa>pb?`${aName}(${a}) 성향이 더 강해요`:`${bName}(${b}) 성향이 더 강해요`}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }
}

function render(){
  document.getElementById("app").innerHTML = currentPage==="opening"?renderOpening():renderDashboard();
}

render();
</script>

  const html = "<!DOCTYPE html>" + document.documentElement.outerHTML;

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

});
