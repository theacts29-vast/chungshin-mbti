.ibox-text{font-size:13px;line-height:1.8;color:#2D2A24}

const CHUNK = 10;
let state = { step:"intro", name:"", dept:"", answers:{}, page:0, result:null };

function calcMBTI(ans) {
  const s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  Object.entries(ans).forEach(([id,ch])=>{
    const q=QUESTIONS.find(q=>q.id===parseInt(id));
    if(!q) return;
    s[ch==="a"?q.a.label:q.b.label]++;
  });
  return (s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P");
}

  try {
    const key = name.replace(/[^a-zA-Z0-9가-힣]/g,"_")+"_"+dept.replace(/[^a-zA-Z0-9가-힣]/g,"_");
    await set(ref(db, "responses/"+key), { name, dept, mbti, ts: Date.now() });
  } catch(e) { console.error("Firebase save error:", e); }
}

function render() {
  const app = document.getElementById("app");
  const {step, name, dept, answers, page, result} = state;

  if(step==="intro") {
    app.innerHTML = `
      <div class="card">
        <p style="font-size:22px;font-weight:800;margin-bottom:8px">안녕하세요 👋</p>
        <p style="font-size:14px;color:#4A5568;line-height:1.8;margin-bottom:16px">
          총 <strong>60문항</strong> · 약 <strong>8분</strong> 소요<br>
          결과는 팀 대시보드에 실시간 반영됩니다.
        </p>
        <div style="background:#F7FAFC;border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:#718096">
          💡 평소 자신과 가장 가까운 답변을 선택해주세요. 정답이 없습니다.
        </div>
        <div style="margin-bottom:14px">
          <div class="label">이름</div>
          <input type="text" id="inp-name" placeholder="예: 홍길동" value="${name}">
        </div>
        <div style="margin-bottom:20px">
          <div class="label">부서</div>
          <select id="inp-dept">
            <option value="">-- 선택 --</option>
            ${DEPARTMENTS.map(d=>`<option value="${d}" ${dept===d?"selected":""}>${d}</option>`).join("")}
          </select>
        </div>
        <div id="err" class="error" style="display:none"></div>
        <button class="next-btn" onclick="startSurvey()">설문 시작하기 →</button>
      </div>`;
  }

  else if(step==="survey") {
    const pageQs = QUESTIONS.slice(page*CHUNK,(page+1)*CHUNK);
    const totalPages = Math.ceil(QUESTIONS.length/CHUNK);
    const answered = pageQs.every(q=>answers[q.id]!==undefined);
    const progress = Math.round((Object.keys(answers).length/QUESTIONS.length)*100);
    const axisNames = {EI:"에너지 방향",SN:"정보 인식",TF:"의사결정",JP:"생활 방식"};

    app.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="page-info">${page+1} / ${totalPages} 페이지 · ${axisNames[pageQs[0].axis]} · ${progress}% 완료</div>
      ${pageQs.map(q=>`
        <div class="q-card">
          <div class="q-num">Q${q.id}.</div>
          <div class="q-text">${q.text}</div>
          <button class="opt-btn ${answers[q.id]==="a"?"selected":""}" onclick="answer(${q.id},'a')">${answers[q.id]==="a"?"✓ ":""}${q.a.text}</button>
          <button class="opt-btn ${answers[q.id]==="b"?"selected":""}" onclick="answer(${q.id},'b')">${answers[q.id]==="b"?"✓ ":""}${q.b.text}</button>
        </div>`).join("")}
      <div style="padding:0 16px">
        <button class="next-btn" ${!answered?"disabled":""} onclick="nextPage()">
          ${page<totalPages-1?`다음 (${page+2}/${totalPages})`:"결과 보기 ✨"}
        </button>
        ${!answered?`<p style="text-align:center;font-size:12px;color:#A0AEC0;margin-top:8px">이 페이지의 모든 질문에 답해주세요</p>`:""}
      </div>`;
  }

  else if(step==="result") {
    const info = MBTI_INFO[result] || {name:"",emoji:"❓",color:"#888",summary:"",gift:"",serve:"",grow:"",together:""};
    const s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    Object.entries(answers).forEach(([id,ch])=>{
      const q=QUESTIONS.find(q=>q.id===parseInt(id));
      if(!q) return;
      s[ch==="a"?q.a.label:q.b.label]++;
    });
    const axes=[["E","I","에너지"],["S","N","인식"],["T","F","판단"],["J","P","생활방식"]];
    const axColors={E:"#4A6FA5",I:"#9B59B6",S:"#3A7A55",N:"#A07820",T:"#2980B9",F:"#C0392B",J:"#7D5BD4",P:"#D47010"};

    app.innerHTML = `
      <div class="card" style="text-align:center">
        <div class="result-emoji">${info.emoji}</div>
        <div class="result-type" style="color:${info.color}">${result}</div>
        <div class="result-name">${info.name}</div>
        <p class="result-desc">${info.summary}</p>
      </div>
      <div class="card">
        <div class="label">성향 분포</div>
        ${axes.map(([a,b,lbl])=>{
          const tot=(s[a]||0)+(s[b]||0)||1;
          const pa=Math.round((s[a]/tot)*100);
          return `<div class="bar-row">
            <div class="bar-labels">
              <span style="color:${axColors[a]};font-weight:600">${a} ${pa}%</span>
              <span style="color:#718096;font-size:11px">${lbl}</span>
              <span style="color:${axColors[b]};font-weight:600">${b} ${100-pa}%</span>
            </div>
            <div class="bar-track">
              <div style="width:${pa}%;background:${axColors[a]}"></div>
              <div style="flex:1;background:${axColors[b]}"></div>
            </div>
          </div>`;
        }).join("")}
      </div>
      <div class="card">
        <div class="ibox" style="background:${info.color}18;border-left:3px solid ${info.color}">
          <div class="ibox-label" style="color:${info.color}">🌱 은사와 강점</div>
          <div class="ibox-text">${info.gift}</div>
        </div>
        <div class="ibox" style="background:#4A6FA518;border-left:3px solid #4A6FA5">
          <div class="ibox-label" style="color:#4A6FA5">🙌 영아부에서의 섬김 방식</div>
          <div class="ibox-text">${info.serve}</div>
        </div>
        <div class="ibox" style="background:#A0782018;border-left:3px solid #A07820">
          <div class="ibox-label" style="color:#A07820">🌿 함께 성장할 부분</div>
          <div class="ibox-text">${info.grow}</div>
        </div>
        <div class="ibox" style="background:#C26A3A18;border-left:3px solid #C26A3A">
          <div class="ibox-label" style="color:#C26A3A">🤝 시너지 파트너</div>
          <div class="ibox-text">${info.together}</div>
        </div>
      </div>
      <div style="margin:0 16px">
        <div class="saved-box">결과가 대시보드에 반영되었습니다 ✓<br><span style="color:#68D391;font-weight:700">진행자 화면을 함께 확인해보세요!</span></div>
      </div>`;
  }
}

window.startSurvey = function() {
  const n = document.getElementById("inp-name").value.trim();
  const d = document.getElementById("inp-dept").value;
  if(!n){document.getElementById("err").textContent="이름을 입력해주세요";document.getElementById("err").style.display="block";return;}
  if(!d){document.getElementById("err").textContent="부서를 선택해주세요";document.getElementById("err").style.display="block";return;}
  state.name=n; state.dept=d; state.step="survey"; render();
};

window.answer = function(id, ch) {
  state.answers[id]=ch; render();
};

window.nextPage = function() {
  const totalPages = Math.ceil(QUESTIONS.length/CHUNK);
  if(state.page < totalPages-1) {
    state.page++; window.scrollTo(0,0); render();
  } else {
    const mbti = calcMBTI(state.answers);
    state.result = mbti; state.step="result";
    saveResult(state.name, state.dept, mbti);
    window.scrollTo(0,0); render();
  }
};

render();
</script>
</body>
</html>
